# ============================================================
# ODPlatform YOLOTrainConfig — odp-gen-config train
# ============================================================

# --- 任务标识 ---
task: detect
experiment_name: exp

# --- 数据 ---
data: safety_helmet.yaml

# --- 模型 ---
model: yolov8n.pt               # Ultralytics YOLOv8 Nano (3.0M params)

# --- 训练参数 ---
epochs: 100
imgsz: 640
batch: 16
device: auto
workers: 8

# --- 优化器 ---
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
optimizer: auto

# --- 数据增强 ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
fliplr: 0.5
mosaic: 1.0
